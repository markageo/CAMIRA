# Config file for testing
testInputDirectory = tests/input/

# Mesh
meshTestInputFilename = mesh_test.inp
meshTest = test
meshTestOutputDirectory= tests/mesh/output/
meshTestReferenceDirectory = tests/mesh/reference/

# Face velocities and finite volume coefficients use the same input files
velUniformTestInputFilename = facevel_uniform_test.inp
velZeroGradientTestInputFilename = facevel_zerogradient_test.inp
velExtrapolatedTestInputFilename = facevel_extrapolated_test.inp

# Face velocities
faceVelTest = test
faceVelTestOutputDirectory= tests/face_velocities/output/
faceVelTestReferenceDirectory = tests/face_velocities/reference/

# Finite volume coefficients
fvCoeffTest = none
fvCoeffTestOutputDirectory= tests/fv_coefficients/output/
fvCoeffTestReferenceDirectory = tests/fv_coefficients/reference/